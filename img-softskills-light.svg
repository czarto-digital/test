<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240">
  <defs>
    <linearGradient id="ssBgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f6"/>
      <stop offset="100%" stop-color="#efefed"/>
    </linearGradient>
    <radialGradient id="ssGlow1L" cx="25%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#0a9578" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a9578" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ssGlow2L" cx="75%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#b5632e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b5632e" stop-opacity="0"/>
    </radialGradient>
    <filter id="ssBlurL"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="ssShadowL"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="960" height="240" fill="url(#ssBgL)"/>
  <ellipse cx="240" cy="130" rx="220" ry="130" fill="url(#ssGlow1L)" filter="url(#ssBlurL)"/>
  <ellipse cx="720" cy="110" rx="200" ry="120" fill="url(#ssGlow2L)" filter="url(#ssBlurL)"/>

  <!-- Person 1 (left) -->
  <g transform="translate(180, 60)" filter="url(#ssShadowL)">
    <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="rgba(10,149,120,0.4)" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="9" fill="rgba(10,149,120,0.3)"/>
    <path d="M-17 22 Q0 14 17 22" fill="rgba(10,149,120,0.15)" stroke="rgba(10,149,120,0.35)" stroke-width="1.2"/>
  </g>

  <!-- Person 2 (center) -->
  <g transform="translate(350, 50)" filter="url(#ssShadowL)">
    <circle cx="0" cy="0" r="28" fill="#ffffff" stroke="#0a9578" stroke-width="2"/>
    <circle cx="0" cy="-3" r="11" fill="rgba(10,149,120,0.45)"/>
    <path d="M-20 27 Q0 18 20 27" fill="rgba(10,149,120,0.2)" stroke="#0a9578" stroke-width="1.5"/>
  </g>

  <!-- Person 3 (right) -->
  <g transform="translate(520, 65)" filter="url(#ssShadowL)">
    <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="rgba(10,149,120,0.4)" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="9" fill="rgba(10,149,120,0.3)"/>
    <path d="M-17 22 Q0 14 17 22" fill="rgba(10,149,120,0.15)" stroke="rgba(10,149,120,0.35)" stroke-width="1.2"/>
  </g>

  <!-- Connection lines -->
  <line x1="202" y1="75" x2="322" y2="68" stroke="rgba(10,149,120,0.25)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="378" y1="68" x2="498" y2="75" stroke="rgba(10,149,120,0.25)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="202" y1="80" x2="498" y2="80" stroke="rgba(10,149,120,0.08)" stroke-width="1" stroke-dasharray="2 8"/>

  <!-- Speech bubble 1 -->
  <g transform="translate(100, 30)">
    <rect x="0" y="0" width="120" height="38" rx="10" fill="#ffffff" stroke="rgba(10,149,120,0.3)" stroke-width="1.2"/>
    <polygon points="30,38 20,50 42,38" fill="#ffffff" stroke="rgba(10,149,120,0.3)" stroke-width="1.2"/>
    <rect x="12" y="12" width="60" height="6" rx="3" fill="rgba(10,149,120,0.3)"/>
    <rect x="12" y="23" width="40" height="5" rx="2.5" fill="rgba(0,0,0,0.08)"/>
  </g>

  <!-- Speech bubble 2 (center, accent) -->
  <g transform="translate(290, 10)">
    <rect x="0" y="0" width="150" height="46" rx="12" fill="#ffffff" stroke="#0a9578" stroke-width="1.5"/>
    <polygon points="55,46 45,60 68,46" fill="#ffffff" stroke="#0a9578" stroke-width="1.5"/>
    <rect x="14" y="13" width="80" height="7" rx="3.5" fill="rgba(10,149,120,0.4)"/>
    <rect x="14" y="26" width="55" height="6" rx="3" fill="rgba(0,0,0,0.07)"/>
  </g>

  <!-- Speech bubble 3 (amber) -->
  <g transform="translate(530, 20)">
    <rect x="0" y="0" width="130" height="40" rx="10" fill="#ffffff" stroke="rgba(181,99,46,0.35)" stroke-width="1.2"/>
    <polygon points="20,40 10,52 32,40" fill="#ffffff" stroke="rgba(181,99,46,0.35)" stroke-width="1.2"/>
    <rect x="12" y="12" width="65" height="6" rx="3" fill="rgba(181,99,46,0.3)"/>
    <rect x="12" y="23" width="45" height="5" rx="2.5" fill="rgba(0,0,0,0.07)"/>
  </g>

  <!-- Team ring (bottom) -->
  <ellipse cx="350" cy="175" rx="120" ry="18" fill="none" stroke="rgba(10,149,120,0.12)" stroke-width="1"/>
  <circle cx="230" cy="175" r="4" fill="rgba(10,149,120,0.35)"/>
  <circle cx="278" cy="162" r="3" fill="rgba(10,149,120,0.25)"/>
  <circle cx="350" cy="157" r="4" fill="#0a9578" opacity="0.6"/>
  <circle cx="422" cy="162" r="3" fill="rgba(10,149,120,0.25)"/>
  <circle cx="470" cy="175" r="4" fill="rgba(10,149,120,0.35)"/>

  <!-- Handshake / connection symbol (right) -->
  <g transform="translate(720, 90)" opacity="0.7">
    <circle cx="0" cy="0" r="50" fill="none" stroke="rgba(10,149,120,0.10)" stroke-width="1"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(10,149,120,0.18)" stroke-width="1.5"/>
    <circle cx="-20" cy="-5" r="10" fill="#ffffff" stroke="rgba(10,149,120,0.45)" stroke-width="1.5"/>
    <circle cx="20" cy="-5" r="10" fill="#ffffff" stroke="rgba(10,149,120,0.45)" stroke-width="1.5"/>
    <path d="M-10,-5 Q0,5 10,-5" fill="none" stroke="#0a9578" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-20" cy="-5" r="4" fill="rgba(10,149,120,0.45)"/>
    <circle cx="20" cy="-5" r="4" fill="rgba(10,149,120,0.45)"/>
  </g>

  <!-- Labels (right) -->
  <g transform="translate(820, 60)" opacity="0.7">
    <rect x="0" y="0" width="90" height="24" rx="12" fill="rgba(10,149,120,0.08)" stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <text x="45" y="16" font-family="'Inter',sans-serif" font-size="10" fill="#0a9578" text-anchor="middle">Teamwork</text>
  </g>
  <g transform="translate(840, 96)" opacity="0.6">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="rgba(181,99,46,0.08)" stroke="rgba(181,99,46,0.25)" stroke-width="1"/>
    <text x="40" y="15" font-family="'Inter',sans-serif" font-size="10" fill="#b5632e" text-anchor="middle">Empathy</text>
  </g>
  <g transform="translate(855, 130)" opacity="0.5">
    <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.18)" stroke-width="1"/>
    <text x="36" y="15" font-family="'Inter',sans-serif" font-size="10" fill="#0a9578" text-anchor="middle">Focus</text>
  </g>
</svg>
