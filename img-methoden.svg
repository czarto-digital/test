<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240">
  <defs>
    <linearGradient id="mBg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1615"/>
      <stop offset="100%" stop-color="#1a3330"/>
    </linearGradient>
    <radialGradient id="mGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2dc4a0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2dc4a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="mBlur"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="960" height="240" fill="url(#mBg)"/>
  <ellipse cx="480" cy="120" rx="300" ry="140" fill="url(#mGlow)" filter="url(#mBlur)"/>

  <!-- Kanban Board -->
  <g transform="translate(80, 30)">
    <!-- Board frame -->
    <rect x="0" y="0" width="380" height="185" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="380" height="26" rx="6" fill="rgba(45,196,160,0.08)" stroke="rgba(45,196,160,0.15)" stroke-width="1"/>
    <text x="14" y="17" font-family="'Inter',sans-serif" font-size="9" font-weight="600" fill="rgba(45,196,160,0.6)" letter-spacing="0.1em">KANBAN BOARD</text>
    <!-- Column labels -->
    <text x="28" y="44" font-family="'Inter',sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="0.08em">TO DO</text>
    <text x="148" y="44" font-family="'Inter',sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="0.08em">IN PROGRESS</text>
    <text x="278" y="44" font-family="'Inter',sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="0.08em">DONE</text>
    <!-- Column dividers -->
    <line x1="126" y1="30" x2="126" y2="185" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="253" y1="30" x2="253" y2="185" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Column 1 cards -->
    <rect x="10" y="52" width="106" height="32" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="14" y="58" width="50" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="14" y="68" width="72" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
    <rect x="10" y="90" width="106" height="32" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="14" y="96" width="40" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>
    <rect x="14" y="106" width="65" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
    <rect x="10" y="128" width="106" height="32" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="14" y="134" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>

    <!-- Column 2 cards (highlighted) -->
    <rect x="136" y="52" width="107" height="36" rx="4" fill="rgba(45,196,160,0.08)" stroke="rgba(45,196,160,0.35)" stroke-width="1.2"/>
    <rect x="140" y="58" width="60" height="5" rx="2.5" fill="rgba(45,196,160,0.5)"/>
    <rect x="140" y="68" width="82" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="140" y="75" width="60" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
    <!-- Progress indicator -->
    <rect x="140" y="82" width="90" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
    <rect x="140" y="82" width="55" height="3" rx="1.5" fill="#2dc4a0" opacity="0.7"/>

    <rect x="136" y="96" width="107" height="32" rx="4" fill="rgba(45,196,160,0.06)" stroke="rgba(45,196,160,0.25)" stroke-width="1"/>
    <rect x="140" y="102" width="50" height="5" rx="2.5" fill="rgba(45,196,160,0.4)"/>
    <rect x="140" y="112" width="78" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>

    <!-- Column 3 cards (done) -->
    <rect x="263" y="52" width="107" height="32" rx="4" fill="rgba(45,196,160,0.04)" stroke="rgba(45,196,160,0.15)" stroke-width="1"/>
    <rect x="267" y="58" width="45" height="5" rx="2.5" fill="rgba(45,196,160,0.3)"/>
    <rect x="267" y="68" width="70" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
    <!-- Checkmark -->
    <circle cx="356" cy="60" r="7" fill="rgba(45,196,160,0.15)" stroke="rgba(45,196,160,0.4)" stroke-width="1"/>
    <polyline points="352,60 355,63 361,57" fill="none" stroke="#2dc4a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="263" y="90" width="107" height="32" rx="4" fill="rgba(45,196,160,0.04)" stroke="rgba(45,196,160,0.15)" stroke-width="1"/>
    <rect x="267" y="96" width="60" height="5" rx="2.5" fill="rgba(45,196,160,0.25)"/>
    <rect x="267" y="106" width="55" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
    <circle cx="356" cy="98" r="7" fill="rgba(45,196,160,0.15)" stroke="rgba(45,196,160,0.4)" stroke-width="1"/>
    <polyline points="352,98 355,101 361,95" fill="none" stroke="#2dc4a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sprint cycle / arrow loop (right area) -->
  <g transform="translate(580, 60)">
    <!-- Circular sprint arc -->
    <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(45,196,160,0.12)" stroke-width="1.5" stroke-dasharray="6 5"/>
    <circle cx="80" cy="80" r="42" fill="none" stroke="rgba(45,196,160,0.2)" stroke-width="2"/>
    <!-- Sprint number -->
    <text x="80" y="72" font-family="'Inter',sans-serif" font-size="11" fill="rgba(255,255,255,0.25)" text-anchor="middle">SPRINT</text>
    <text x="80" y="90" font-family="'Inter',sans-serif" font-size="22" font-weight="700" fill="rgba(45,196,160,0.6)" text-anchor="middle">03</text>
    <!-- Arrow at top of outer circle -->
    <polygon points="138,62 146,75 130,75" fill="#2dc4a0" opacity="0.7" transform="rotate(30 80 80)"/>
  </g>

  <!-- Tool icons row (far right) -->
  <g transform="translate(760, 45)" opacity="0.7">
    <!-- Jira-like icon -->
    <rect x="0" y="0" width="36" height="36" rx="8" fill="rgba(45,196,160,0.1)" stroke="rgba(45,196,160,0.3)" stroke-width="1"/>
    <text x="18" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="rgba(45,196,160,0.7)" text-anchor="middle">J</text>
    <!-- Miro-like icon -->
    <rect x="46" y="0" width="36" height="36" rx="8" fill="rgba(196,154,94,0.1)" stroke="rgba(196,154,94,0.3)" stroke-width="1"/>
    <text x="64" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="rgba(196,154,94,0.7)" text-anchor="middle">M</text>
    <!-- Slack-like icon -->
    <rect x="92" y="0" width="36" height="36" rx="8" fill="rgba(45,196,160,0.08)" stroke="rgba(45,196,160,0.25)" stroke-width="1"/>
    <text x="110" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="rgba(45,196,160,0.5)" text-anchor="middle">S</text>
  </g>

  <!-- Waterfall steps (below tools) -->
  <g transform="translate(755, 110)" opacity="0.5">
    <rect x="0"   y="0"  width="60" height="14" rx="3" fill="rgba(45,196,160,0.15)" stroke="rgba(45,196,160,0.3)" stroke-width="1"/>
    <rect x="20"  y="20" width="60" height="14" rx="3" fill="rgba(45,196,160,0.12)" stroke="rgba(45,196,160,0.25)" stroke-width="1"/>
    <rect x="40"  y="40" width="60" height="14" rx="3" fill="rgba(45,196,160,0.09)" stroke="rgba(45,196,160,0.2)" stroke-width="1"/>
    <rect x="60"  y="60" width="60" height="14" rx="3" fill="rgba(45,196,160,0.06)" stroke="rgba(45,196,160,0.15)" stroke-width="1"/>
    <text x="30"  y="11" font-family="'Inter',sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Plan</text>
    <text x="50"  y="31" font-family="'Inter',sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Design</text>
    <text x="70"  y="51" font-family="'Inter',sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Build</text>
    <text x="90"  y="71" font-family="'Inter',sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">Ship</text>
  </g>
</svg>
