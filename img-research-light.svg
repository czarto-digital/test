<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220">
  <defs>
    <radialGradient id="rGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a9578" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#0a9578" stop-opacity="0"/>
    </radialGradient>
    <filter id="rBlurL"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="480" height="220" fill="#f8f8f6"/>
  <ellipse cx="180" cy="115" rx="130" ry="100" fill="url(#rGlowL)" filter="url(#rBlurL)"/>

  <!-- Dot grid -->
  <g opacity="0.10">
    <circle cx="40" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="100" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="160" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="220" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="280" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="340" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="400" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="440" cy="40" r="1.2" fill="#0a9578"/>
    <circle cx="40" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="100" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="160" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="220" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="280" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="340" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="400" cy="100" r="1.2" fill="#0a9578"/>
    <circle cx="40" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="100" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="160" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="220" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="280" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="340" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="400" cy="160" r="1.2" fill="#0a9578"/>
    <circle cx="440" cy="160" r="1.2" fill="#0a9578"/>
  </g>

  <!-- Network lines -->
  <g stroke="#0a9578" stroke-width="1" opacity="0.18">
    <line x1="110" y1="90" x2="200" y2="115"/>
    <line x1="200" y1="115" x2="295" y2="70"/>
    <line x1="200" y1="115" x2="280" y2="165"/>
    <line x1="110" y1="90" x2="65" y2="150"/>
    <line x1="295" y1="70" x2="370" y2="95"/>
    <line x1="280" y1="165" x2="370" y2="95"/>
    <line x1="65" y1="150" x2="280" y2="165"/>
    <line x1="110" y1="90" x2="160" y2="48"/>
    <line x1="160" y1="48" x2="295" y2="70"/>
  </g>

  <!-- Center node rings -->
  <circle cx="200" cy="115" r="32" fill="none" stroke="#0a9578" stroke-width="1" opacity="0.18"/>
  <circle cx="200" cy="115" r="22" fill="rgba(10,149,120,0.07)" stroke="#0a9578" stroke-width="1.5" opacity="0.6"/>
  <!-- Center person -->
  <circle cx="200" cy="108" r="7" fill="none" stroke="#0a9578" stroke-width="1.5" opacity="0.85"/>
  <path d="M187 124 q13-10 26 0" fill="none" stroke="#0a9578" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Satellite nodes -->
  <circle cx="110" cy="90" r="14" fill="rgba(10,149,120,0.05)" stroke="#0a9578" stroke-width="1" opacity="0.45"/>
  <circle cx="110" cy="86" r="5" fill="none" stroke="#0a9578" stroke-width="1.2" opacity="0.65"/>
  <path d="M103 97 q7-6 14 0" fill="none" stroke="#0a9578" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>

  <circle cx="295" cy="70" r="14" fill="rgba(10,149,120,0.05)" stroke="#0a9578" stroke-width="1" opacity="0.45"/>
  <circle cx="295" cy="66" r="5" fill="none" stroke="#0a9578" stroke-width="1.2" opacity="0.65"/>
  <path d="M288 77 q7-6 14 0" fill="none" stroke="#0a9578" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>

  <circle cx="280" cy="165" r="14" fill="rgba(10,149,120,0.05)" stroke="#0a9578" stroke-width="1" opacity="0.45"/>
  <circle cx="280" cy="161" r="5" fill="none" stroke="#0a9578" stroke-width="1.2" opacity="0.65"/>
  <path d="M273 172 q7-6 14 0" fill="none" stroke="#0a9578" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>

  <circle cx="65"  cy="150" r="10" fill="rgba(10,149,120,0.04)" stroke="#0a9578" stroke-width="1" opacity="0.35"/>
  <circle cx="160" cy="48"  r="10" fill="rgba(10,149,120,0.04)" stroke="#0a9578" stroke-width="1" opacity="0.35"/>
  <circle cx="370" cy="95"  r="10" fill="rgba(10,149,120,0.04)" stroke="#0a9578" stroke-width="1" opacity="0.35"/>

  <!-- Magnifying glass top-right -->
  <g transform="translate(385,28)" opacity="0.30">
    <circle cx="22" cy="22" r="18" fill="none" stroke="#0a9578" stroke-width="2.5"/>
    <line x1="35" y1="35" x2="48" y2="48" stroke="#0a9578" stroke-width="3" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="10" fill="rgba(10,149,120,0.07)"/>
  </g>

  <!-- Pulse ring -->
  <circle cx="200" cy="115" r="42" fill="none" stroke="#0a9578" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.15"/>

  <!-- Survey box bottom-left -->
  <g opacity="0.22">
    <rect x="25" y="178" width="52" height="27" rx="3" fill="none" stroke="#0a9578" stroke-width="1" opacity="0.6"/>
    <line x1="28" y1="185" x2="70" y2="185" stroke="#0a9578" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="192" x2="55" y2="192" stroke="#0a9578" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="199" x2="62" y2="199" stroke="#0a9578" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
