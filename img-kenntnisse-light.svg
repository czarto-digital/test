<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240">
  <defs>
    <linearGradient id="kBgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f6"/>
      <stop offset="100%" stop-color="#efefed"/>
    </linearGradient>
    <radialGradient id="kGlow1L" cx="35%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0a9578" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a9578" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kGlow2L" cx="75%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#b5632e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b5632e" stop-opacity="0"/>
    </radialGradient>
    <filter id="kBlurL"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="960" height="240" fill="url(#kBgL)"/>
  <ellipse cx="330" cy="120" rx="260" ry="140" fill="url(#kGlow1L)" filter="url(#kBlurL)"/>
  <ellipse cx="720" cy="100" rx="220" ry="130" fill="url(#kGlow2L)" filter="url(#kBlurL)"/>

  <!-- Central network -->
  <g transform="translate(200, 50)">
    <!-- Outer orbit ring -->
    <circle cx="110" cy="90" r="80" fill="none" stroke="rgba(10,149,120,0.08)" stroke-width="1" stroke-dasharray="4 6"/>
    <!-- Inner ring -->
    <circle cx="110" cy="90" r="52" fill="none" stroke="rgba(10,149,120,0.15)" stroke-width="1.5"/>
    <!-- Core rings -->
    <circle cx="110" cy="90" r="28" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.3)" stroke-width="1.5"/>
    <circle cx="110" cy="90" r="14" fill="rgba(10,149,120,0.12)" stroke="#0a9578" stroke-width="1.5"/>
    <!-- Core dot -->
    <circle cx="110" cy="90" r="6" fill="#0a9578" opacity="0.7"/>
    <!-- Radiating lines -->
    <line x1="110" y1="62" x2="110" y2="38" stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <line x1="133" y1="72" x2="153" y2="58" stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <line x1="138" y1="100" x2="162" y2="108" stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <line x1="110" y1="118" x2="110" y2="142" stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <line x1="82"  y1="108" x2="58"  y2="118" stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <line x1="82"  y1="72"  x2="62"  y2="58"  stroke="rgba(10,149,120,0.25)" stroke-width="1"/>
    <!-- Orbit nodes -->
    <circle cx="110" cy="38" r="8" fill="#ffffff" stroke="#0a9578" stroke-width="1.5"/>
    <circle cx="153" cy="58" r="7" fill="#ffffff" stroke="rgba(10,149,120,0.45)" stroke-width="1.2"/>
    <circle cx="162" cy="108" r="7" fill="#ffffff" stroke="rgba(10,149,120,0.45)" stroke-width="1.2"/>
    <circle cx="110" cy="142" r="8" fill="#ffffff" stroke="#0a9578" stroke-width="1.5"/>
    <circle cx="58"  cy="118" r="7" fill="#ffffff" stroke="rgba(10,149,120,0.45)" stroke-width="1.2"/>
    <circle cx="62"  cy="58"  r="7" fill="#ffffff" stroke="rgba(10,149,120,0.45)" stroke-width="1.2"/>
    <!-- Node fills -->
    <circle cx="110" cy="38"  r="4" fill="rgba(10,149,120,0.45)"/>
    <circle cx="110" cy="142" r="4" fill="rgba(10,149,120,0.45)"/>
  </g>

  <!-- Domain badges -->
  <!-- E-Commerce -->
  <g transform="translate(460, 35)">
    <rect x="0" y="0" width="145" height="38" rx="8" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.25)" stroke-width="1.2"/>
    <rect x="10" y="10" width="14" height="14" rx="3" fill="rgba(10,149,120,0.15)" stroke="rgba(10,149,120,0.3)" stroke-width="1"/>
    <text x="34" y="22" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="rgba(0,0,0,0.45)">E-Commerce</text>
  </g>

  <!-- SaaS -->
  <g transform="translate(625, 35)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="rgba(10,149,120,0.05)" stroke="rgba(10,149,120,0.20)" stroke-width="1.2"/>
    <text x="60" y="23" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="rgba(10,149,120,0.65)" text-anchor="middle">SaaS / Apps</text>
  </g>

  <!-- CRO badge (amber) -->
  <g transform="translate(460, 92)">
    <rect x="0" y="0" width="110" height="38" rx="8" fill="rgba(181,99,46,0.07)" stroke="rgba(181,99,46,0.3)" stroke-width="1.2"/>
    <text x="55" y="23" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="rgba(181,99,46,0.75)" text-anchor="middle">CRO</text>
  </g>

  <!-- Agile badge -->
  <g transform="translate(590, 92)">
    <rect x="0" y="0" width="155" height="38" rx="8" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.22)" stroke-width="1.2"/>
    <text x="77" y="23" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="rgba(0,0,0,0.4)" text-anchor="middle">Agile Development</text>
  </g>

  <!-- Accessibility badge -->
  <g transform="translate(460, 149)">
    <rect x="0" y="0" width="130" height="36" rx="8" fill="rgba(10,149,120,0.04)" stroke="rgba(10,149,120,0.16)" stroke-width="1"/>
    <text x="65" y="22" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="rgba(0,0,0,0.35)" text-anchor="middle">Accessibility</text>
  </g>

  <!-- Data-Driven badge (amber) -->
  <g transform="translate(610, 149)">
    <rect x="0" y="0" width="140" height="36" rx="8" fill="rgba(181,99,46,0.06)" stroke="rgba(181,99,46,0.22)" stroke-width="1"/>
    <text x="70" y="22" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="rgba(181,99,46,0.6)" text-anchor="middle">Data-Driven</text>
  </g>

  <!-- Stakeholder badge -->
  <g transform="translate(770, 92)">
    <rect x="0" y="0" width="142" height="38" rx="8" fill="rgba(10,149,120,0.05)" stroke="rgba(10,149,120,0.18)" stroke-width="1"/>
    <text x="71" y="23" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="rgba(0,0,0,0.35)" text-anchor="middle">Stakeholder Mgmt.</text>
  </g>

  <!-- Connection lines -->
  <line x1="338" y1="100" x2="455" y2="54"  stroke="rgba(10,149,120,0.12)" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="338" y1="115" x2="455" y2="111" stroke="rgba(10,149,120,0.10)" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="338" y1="130" x2="455" y2="167" stroke="rgba(10,149,120,0.08)" stroke-width="1" stroke-dasharray="3 5"/>
</svg>
