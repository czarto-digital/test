<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220">
  <defs>
    <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111e1c"/>
      <stop offset="100%" stop-color="#0d1615"/>
    </linearGradient>
    <radialGradient id="pGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2dc4a0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2dc4a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="pBlur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="pShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="480" height="220" fill="url(#pBg)"/>
  <ellipse cx="240" cy="110" rx="160" ry="100" fill="url(#pGlow)" filter="url(#pBlur)"/>

  <!-- Frame 1 – back (desktop screen) -->
  <g opacity="0.4" filter="url(#pShadow)">
    <rect x="48" y="45" width="185" height="130" rx="5" fill="#192c2a" stroke="rgba(45,196,160,0.3)" stroke-width="1.2"/>
    <rect x="48" y="45" width="185" height="18" rx="5" fill="rgba(45,196,160,0.1)" stroke="rgba(45,196,160,0.3)" stroke-width="1.2"/>
    <circle cx="60" cy="54" r="3" fill="rgba(255,255,255,0.2)"/>
    <circle cx="70" cy="54" r="3" fill="rgba(255,255,255,0.2)"/>
    <circle cx="80" cy="54" r="3" fill="rgba(255,255,255,0.2)"/>
    <!-- Content skeleton -->
    <rect x="58" y="72" width="100" height="10" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="58" y="88" width="155" height="6" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="58" y="99" width="120" height="6" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="58" y="115" width="70" height="18" rx="9" fill="rgba(45,196,160,0.15)" stroke="rgba(45,196,160,0.3)" stroke-width="1"/>
    <!-- Stand -->
    <rect x="126" y="175" width="12" height="14" rx="2" fill="rgba(255,255,255,0.06)"/>
    <rect x="108" y="189" width="48" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  </g>

  <!-- Connecting arrow 1→2 -->
  <g opacity="0.55">
    <path d="M230 105 Q265 90 278 105" fill="none" stroke="#2dc4a0" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="278,100 285,108 271,108" fill="#2dc4a0" opacity="0.8"/>
  </g>

  <!-- Frame 2 – middle (tablet) -->
  <g filter="url(#pShadow)">
    <rect x="168" y="30" width="145" height="190" rx="8" fill="#192c2a" stroke="rgba(45,196,160,0.5)" stroke-width="1.5"/>
    <rect x="168" y="30" width="145" height="22" rx="8" fill="rgba(45,196,160,0.12)"/>
    <!-- Status bar dots -->
    <circle cx="182" cy="41" r="3.5" fill="rgba(255,255,255,0.25)"/>
    <circle cx="194" cy="41" r="3.5" fill="rgba(255,255,255,0.25)"/>
    <circle cx="206" cy="41" r="3.5" fill="rgba(255,255,255,0.25)"/>
    <!-- Content -->
    <rect x="180" y="62" width="90" height="12" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="180" y="80" width="121" height="5" rx="2" fill="rgba(255,255,255,0.06)"/>
    <rect x="180" y="90" width="100" height="5" rx="2" fill="rgba(255,255,255,0.06)"/>
    <!-- Image placeholder -->
    <rect x="180" y="104" width="121" height="54" rx="4" fill="rgba(45,196,160,0.08)" stroke="rgba(45,196,160,0.2)" stroke-width="1"/>
    <line x1="180" y1="158" x2="301" y2="104" stroke="rgba(45,196,160,0.1)" stroke-width="1"/>
    <line x1="180" y1="104" x2="301" y2="158" stroke="rgba(45,196,160,0.1)" stroke-width="1"/>
    <!-- CTA -->
    <rect x="180" y="164" width="60" height="16" rx="8" fill="#2dc4a0" opacity="0.85"/>
    <!-- Home indicator -->
    <rect x="220" y="212" width="42" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <!-- Hotspot rings -->
    <circle cx="210" cy="172" r="10" fill="none" stroke="#2dc4a0" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
    <circle cx="210" cy="172" r="5" fill="rgba(45,196,160,0.25)"/>
  </g>

  <!-- Connecting arrow 2→3 -->
  <g opacity="0.55">
    <path d="M313 100 Q340 85 353 100" fill="none" stroke="#2dc4a0" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="353,95 360,103 346,103" fill="#2dc4a0" opacity="0.8"/>
  </g>

  <!-- Frame 3 – front (mobile) -->
  <g opacity="0.55" filter="url(#pShadow)">
    <rect x="315" y="52" width="112" height="148" rx="10" fill="#192c2a" stroke="rgba(45,196,160,0.3)" stroke-width="1.2"/>
    <!-- Notch -->
    <rect x="347" y="52" width="48" height="10" rx="5" fill="#0d1615"/>
    <circle cx="371" cy="57" r="3" fill="rgba(45,196,160,0.3)"/>
    <!-- Content -->
    <rect x="325" y="72" width="92" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="325" y="87" width="75" height="5" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="325" y="97" width="84" height="5" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="325" y="111" width="92" height="46" rx="4" fill="rgba(45,196,160,0.07)"/>
    <rect x="325" y="163" width="50" height="14" rx="7" fill="rgba(45,196,160,0.2)" stroke="rgba(45,196,160,0.3)" stroke-width="1"/>
    <!-- Home bar -->
    <rect x="348" y="191" width="46" height="3" rx="2" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- Layer stack indicator -->
  <g opacity="0.3" transform="translate(430, 165)">
    <rect x="0" y="12" width="32" height="22" rx="2" fill="none" stroke="#2dc4a0" stroke-width="1"/>
    <rect x="4" y="6" width="32" height="22" rx="2" fill="none" stroke="#2dc4a0" stroke-width="1"/>
    <rect x="8" y="0" width="32" height="22" rx="2" fill="rgba(45,196,160,0.15)" stroke="#2dc4a0" stroke-width="1"/>
  </g>
</svg>
