<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220">
  <defs>
    <linearGradient id="rBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1615"/>
      <stop offset="100%" stop-color="#1e3d38"/>
    </linearGradient>
    <linearGradient id="rAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dc4a0"/>
      <stop offset="100%" stop-color="#60d4bc"/>
    </linearGradient>
    <radialGradient id="rGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dc4a0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dc4a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="rBlur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="220" fill="url(#rBg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.12">
    <circle cx="40" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="100" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="160" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="220" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="280" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="340" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="400" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="440" cy="40" r="1.2" fill="#2dc4a0"/>
    <circle cx="40" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="100" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="160" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="220" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="280" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="340" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="400" cy="100" r="1.2" fill="#2dc4a0"/>
    <circle cx="40" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="100" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="160" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="220" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="280" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="340" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="400" cy="160" r="1.2" fill="#2dc4a0"/>
    <circle cx="440" cy="160" r="1.2" fill="#2dc4a0"/>
  </g>

  <!-- Glow blob center-left -->
  <ellipse cx="180" cy="115" rx="130" ry="100" fill="url(#rGlow)" filter="url(#rBlur)"/>

  <!-- Network connection lines -->
  <g stroke="#2dc4a0" stroke-width="1" opacity="0.2">
    <line x1="110" y1="90" x2="200" y2="115"/>
    <line x1="200" y1="115" x2="295" y2="70"/>
    <line x1="200" y1="115" x2="280" y2="165"/>
    <line x1="110" y1="90" x2="65" y2="150"/>
    <line x1="295" y1="70" x2="370" y2="95"/>
    <line x1="280" y1="165" x2="370" y2="95"/>
    <line x1="65" y1="150" x2="280" y2="165"/>
    <line x1="110" y1="90" x2="160" y2="48"/>
    <line x1="160" y1="48" x2="295" y2="70"/>
  </g>

  <!-- Person nodes – outer rings -->
  <circle cx="200" cy="115" r="32" fill="none" stroke="#2dc4a0" stroke-width="1" opacity="0.25"/>
  <circle cx="200" cy="115" r="22" fill="rgba(45,196,160,0.08)" stroke="#2dc4a0" stroke-width="1.5" opacity="0.6"/>

  <!-- Center person icon -->
  <circle cx="200" cy="108" r="7" fill="none" stroke="#2dc4a0" stroke-width="1.5" opacity="0.9"/>
  <path d="M187 124 q13-10 26 0" fill="none" stroke="#2dc4a0" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Satellite nodes -->
  <circle cx="110" cy="90" r="14" fill="rgba(45,196,160,0.06)" stroke="#2dc4a0" stroke-width="1" opacity="0.5"/>
  <circle cx="110" cy="86" r="5" fill="none" stroke="#2dc4a0" stroke-width="1.2" opacity="0.7"/>
  <path d="M103 97 q7-6 14 0" fill="none" stroke="#2dc4a0" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <circle cx="295" cy="70" r="14" fill="rgba(45,196,160,0.06)" stroke="#2dc4a0" stroke-width="1" opacity="0.5"/>
  <circle cx="295" cy="66" r="5" fill="none" stroke="#2dc4a0" stroke-width="1.2" opacity="0.7"/>
  <path d="M288 77 q7-6 14 0" fill="none" stroke="#2dc4a0" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <circle cx="280" cy="165" r="14" fill="rgba(45,196,160,0.06)" stroke="#2dc4a0" stroke-width="1" opacity="0.5"/>
  <circle cx="280" cy="161" r="5" fill="none" stroke="#2dc4a0" stroke-width="1.2" opacity="0.7"/>
  <path d="M273 172 q7-6 14 0" fill="none" stroke="#2dc4a0" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <circle cx="65" cy="150" r="10" fill="rgba(45,196,160,0.05)" stroke="#2dc4a0" stroke-width="1" opacity="0.4"/>
  <circle cx="160" cy="48" r="10" fill="rgba(45,196,160,0.05)" stroke="#2dc4a0" stroke-width="1" opacity="0.4"/>
  <circle cx="370" cy="95" r="10" fill="rgba(45,196,160,0.05)" stroke="#2dc4a0" stroke-width="1" opacity="0.4"/>

  <!-- Magnifying glass top-right -->
  <g transform="translate(385,28)" opacity="0.35">
    <circle cx="22" cy="22" r="18" fill="none" stroke="#2dc4a0" stroke-width="2.5"/>
    <line x1="35" y1="35" x2="48" y2="48" stroke="#2dc4a0" stroke-width="3" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="10" fill="rgba(45,196,160,0.08)"/>
  </g>

  <!-- Data pulse dots -->
  <circle cx="200" cy="115" r="42" fill="none" stroke="#2dc4a0" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.2"/>

  <!-- Survey lines bottom-left -->
  <g opacity="0.2" stroke="#fff" stroke-linecap="round">
    <line x1="28" y1="185" x2="70" y2="185" stroke-width="1.5"/>
    <line x1="28" y1="192" x2="55" y2="192" stroke-width="1.5"/>
    <line x1="28" y1="199" x2="62" y2="199" stroke-width="1.5"/>
    <rect x="25" y="178" width="52" height="27" rx="3" fill="none" stroke="#2dc4a0" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
