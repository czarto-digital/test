<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220">
  <defs>
    <radialGradient id="dGlowL" cx="60%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0a9578" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a9578" stop-opacity="0"/>
    </radialGradient>
    <filter id="dBlurL"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="480" height="220" fill="#f8f8f6"/>
  <ellipse cx="290" cy="100" rx="160" ry="110" fill="url(#dGlowL)" filter="url(#dBlurL)"/>

  <!-- Canvas / artboard frame -->
  <rect x="80" y="30" width="320" height="200" rx="4" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="80" y="30" width="320" height="28" rx="4" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.15)" stroke-width="1"/>
  <circle cx="98" cy="44" r="4" fill="#e57373" opacity="0.55"/>
  <circle cx="112" cy="44" r="4" fill="#ffb74d" opacity="0.55"/>
  <circle cx="126" cy="44" r="4" fill="#81c784" opacity="0.55"/>
  <!-- Tabs -->
  <rect x="155" y="38" width="40" height="12" rx="2" fill="rgba(10,149,120,0.2)" stroke="#0a9578" stroke-width="0.8"/>
  <rect x="202" y="38" width="32" height="12" rx="2" fill="rgba(0,0,0,0.04)"/>
  <rect x="241" y="38" width="32" height="12" rx="2" fill="rgba(0,0,0,0.04)"/>

  <!-- Left panel / layers -->
  <rect x="80" y="58" width="60" height="172" rx="0" fill="rgba(0,0,0,0.02)" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <!-- Layer items -->
  <g opacity="0.5" fill="none" stroke="#0a9578" stroke-width="1">
    <rect x="88" y="70" width="44" height="8" rx="2"/>
    <rect x="88" y="84" width="36" height="8" rx="2" stroke="rgba(0,0,0,0.2)"/>
    <rect x="88" y="98" width="40" height="8" rx="2" stroke="rgba(0,0,0,0.2)"/>
    <rect x="88" y="112" width="28" height="8" rx="2" stroke="rgba(0,0,0,0.2)"/>
  </g>
  <!-- Selected layer -->
  <rect x="84" y="68" width="52" height="12" rx="2" fill="rgba(10,149,120,0.10)" stroke="#0a9578" stroke-width="0.8" opacity="0.8"/>

  <!-- Hero block wireframe -->
  <rect x="155" y="65" width="230" height="55" rx="3" fill="rgba(10,149,120,0.05)" stroke="rgba(10,149,120,0.2)" stroke-width="1"/>
  <rect x="165" y="78" width="100" height="8" rx="2" fill="rgba(0,0,0,0.10)"/>
  <rect x="165" y="92" width="70" height="6" rx="2" fill="rgba(0,0,0,0.06)"/>
  <rect x="165" y="102" width="50" height="14" rx="7" fill="#0a9578" opacity="0.75"/>

  <!-- Card row -->
  <rect x="155" y="128" width="70" height="52" rx="3" fill="#f5f5f3" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <rect x="232" y="128" width="70" height="52" rx="3" fill="#f5f5f3" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <rect x="309" y="128" width="71" height="52" rx="3" fill="#f5f5f3" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <!-- Card image areas -->
  <rect x="159" y="132" width="62" height="24" rx="2" fill="rgba(10,149,120,0.07)"/>
  <rect x="236" y="132" width="62" height="24" rx="2" fill="rgba(10,149,120,0.07)"/>
  <rect x="313" y="132" width="63" height="24" rx="2" fill="rgba(10,149,120,0.07)"/>
  <!-- Card text lines -->
  <rect x="159" y="160" width="40" height="5" rx="1.5" fill="rgba(0,0,0,0.10)"/>
  <rect x="159" y="169" width="55" height="4" rx="1.5" fill="rgba(0,0,0,0.06)"/>
  <rect x="236" y="160" width="40" height="5" rx="1.5" fill="rgba(0,0,0,0.10)"/>
  <rect x="313" y="160" width="40" height="5" rx="1.5" fill="rgba(0,0,0,0.10)"/>

  <!-- Ruler -->
  <g opacity="0.10" stroke="#000" stroke-width="0.5">
    <line x1="140" y1="58" x2="400" y2="58"/>
    <line x1="140" y1="63" x2="140" y2="55"/>
    <line x1="200" y1="61" x2="200" y2="55"/>
    <line x1="260" y1="61" x2="260" y2="55"/>
    <line x1="320" y1="61" x2="320" y2="55"/>
    <line x1="380" y1="61" x2="380" y2="55"/>
  </g>

  <!-- Color swatches -->
  <g transform="translate(405, 155)">
    <circle cx="0"  cy="0"  r="9" fill="#0a9578" opacity="0.85"/>
    <circle cx="20" cy="0"  r="9" fill="#e8e8e6" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <circle cx="40" cy="0"  r="9" fill="#b5632e" opacity="0.75"/>
    <circle cx="0"  cy="20" r="9" fill="rgba(0,0,0,0.55)" opacity="0.5"/>
    <circle cx="20" cy="20" r="9" fill="#12b595" opacity="0.65"/>
    <circle cx="40" cy="20" r="9" fill="rgba(0,0,0,0.06)" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
  </g>

  <!-- Cursor -->
  <g transform="translate(325,88)" opacity="0.55">
    <polygon points="0,0 0,20 5,15 9,22 11,21 7,14 13,14" fill="#1a1a18"/>
  </g>

  <!-- Spacing guides -->
  <line x1="155" y1="122" x2="385" y2="122" stroke="#0a9578" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.22"/>
  <line x1="155" y1="184" x2="385" y2="184" stroke="#0a9578" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.22"/>
</svg>
