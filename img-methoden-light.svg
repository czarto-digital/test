<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240">
  <defs>
    <linearGradient id="mBgL" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8f8f6"/>
      <stop offset="100%" stop-color="#efefed"/>
    </linearGradient>
    <radialGradient id="mGlowL" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#0a9578" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a9578" stop-opacity="0"/>
    </radialGradient>
    <filter id="mBlurL"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="960" height="240" fill="url(#mBgL)"/>
  <ellipse cx="480" cy="120" rx="300" ry="140" fill="url(#mGlowL)" filter="url(#mBlurL)"/>

  <!-- Kanban Board -->
  <g transform="translate(80, 30)">
    <!-- Board frame -->
    <rect x="0" y="0" width="380" height="185" rx="6" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="380" height="26" rx="6" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.12)" stroke-width="1"/>
    <text x="14" y="17" font-family="'Inter',sans-serif" font-size="9" font-weight="600" fill="rgba(10,149,120,0.7)" letter-spacing="0.1em">KANBAN BOARD</text>
    <!-- Column labels -->
    <text x="28"  y="44" font-family="'Inter',sans-serif" font-size="8" fill="rgba(0,0,0,0.35)" letter-spacing="0.08em">TO DO</text>
    <text x="148" y="44" font-family="'Inter',sans-serif" font-size="8" fill="rgba(0,0,0,0.35)" letter-spacing="0.08em">IN PROGRESS</text>
    <text x="278" y="44" font-family="'Inter',sans-serif" font-size="8" fill="rgba(0,0,0,0.35)" letter-spacing="0.08em">DONE</text>
    <!-- Column dividers -->
    <line x1="126" y1="30" x2="126" y2="185" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="253" y1="30" x2="253" y2="185" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>

    <!-- Column 1 cards -->
    <rect x="10" y="52" width="106" height="32" rx="4" fill="#f5f5f3" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <rect x="14" y="58" width="50" height="5" rx="2.5" fill="rgba(0,0,0,0.14)"/>
    <rect x="14" y="68" width="72" height="4" rx="2" fill="rgba(0,0,0,0.06)"/>
    <rect x="10" y="90" width="106" height="32" rx="4" fill="#f5f5f3" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <rect x="14" y="96" width="40" height="5" rx="2.5" fill="rgba(0,0,0,0.12)"/>
    <rect x="14" y="106" width="65" height="4" rx="2" fill="rgba(0,0,0,0.06)"/>
    <rect x="10" y="128" width="106" height="32" rx="4" fill="#f5f5f3" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
    <rect x="14" y="134" width="55" height="5" rx="2.5" fill="rgba(0,0,0,0.10)"/>

    <!-- Column 2 cards (highlighted) -->
    <rect x="136" y="52" width="107" height="36" rx="4" fill="rgba(10,149,120,0.07)" stroke="rgba(10,149,120,0.3)" stroke-width="1.2"/>
    <rect x="140" y="58" width="60" height="5" rx="2.5" fill="rgba(10,149,120,0.5)"/>
    <rect x="140" y="68" width="82" height="4" rx="2" fill="rgba(0,0,0,0.08)"/>
    <rect x="140" y="75" width="60" height="4" rx="2" fill="rgba(0,0,0,0.05)"/>
    <!-- Progress bar -->
    <rect x="140" y="82" width="90" height="3" rx="1.5" fill="rgba(0,0,0,0.07)"/>
    <rect x="140" y="82" width="55" height="3" rx="1.5" fill="#0a9578" opacity="0.65"/>

    <rect x="136" y="96" width="107" height="32" rx="4" fill="rgba(10,149,120,0.05)" stroke="rgba(10,149,120,0.22)" stroke-width="1"/>
    <rect x="140" y="102" width="50" height="5" rx="2.5" fill="rgba(10,149,120,0.38)"/>
    <rect x="140" y="112" width="78" height="4" rx="2" fill="rgba(0,0,0,0.06)"/>

    <!-- Column 3 cards (done) -->
    <rect x="263" y="52" width="107" height="32" rx="4" fill="rgba(10,149,120,0.04)" stroke="rgba(10,149,120,0.15)" stroke-width="1"/>
    <rect x="267" y="58" width="45" height="5" rx="2.5" fill="rgba(10,149,120,0.28)"/>
    <rect x="267" y="68" width="70" height="4" rx="2" fill="rgba(0,0,0,0.05)"/>
    <circle cx="356" cy="60" r="7" fill="rgba(10,149,120,0.12)" stroke="rgba(10,149,120,0.4)" stroke-width="1"/>
    <polyline points="352,60 355,63 361,57" fill="none" stroke="#0a9578" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="263" y="90" width="107" height="32" rx="4" fill="rgba(10,149,120,0.04)" stroke="rgba(10,149,120,0.15)" stroke-width="1"/>
    <rect x="267" y="96" width="60" height="5" rx="2.5" fill="rgba(10,149,120,0.22)"/>
    <rect x="267" y="106" width="55" height="4" rx="2" fill="rgba(0,0,0,0.05)"/>
    <circle cx="356" cy="98" r="7" fill="rgba(10,149,120,0.12)" stroke="rgba(10,149,120,0.4)" stroke-width="1"/>
    <polyline points="352,98 355,101 361,95" fill="none" stroke="#0a9578" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sprint cycle (right) -->
  <g transform="translate(580, 60)">
    <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(10,149,120,0.10)" stroke-width="1.5" stroke-dasharray="6 5"/>
    <circle cx="80" cy="80" r="42" fill="none" stroke="rgba(10,149,120,0.18)" stroke-width="2"/>
    <text x="80" y="72" font-family="'Inter',sans-serif" font-size="11" fill="rgba(0,0,0,0.25)" text-anchor="middle">SPRINT</text>
    <text x="80" y="90" font-family="'Inter',sans-serif" font-size="22" font-weight="700" fill="rgba(10,149,120,0.55)" text-anchor="middle">03</text>
    <polygon points="138,62 146,75 130,75" fill="#0a9578" opacity="0.65" transform="rotate(30 80 80)"/>
  </g>

  <!-- Tool icons (far right) -->
  <g transform="translate(760, 45)" opacity="0.75">
    <rect x="0"  y="0" width="36" height="36" rx="8" fill="rgba(10,149,120,0.08)" stroke="rgba(10,149,120,0.28)" stroke-width="1"/>
    <text x="18" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="rgba(10,149,120,0.65)" text-anchor="middle">J</text>
    <rect x="46" y="0" width="36" height="36" rx="8" fill="rgba(181,99,46,0.08)" stroke="rgba(181,99,46,0.28)" stroke-width="1"/>
    <text x="64" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="rgba(181,99,46,0.65)" text-anchor="middle">M</text>
    <rect x="92" y="0" width="36" height="36" rx="8" fill="rgba(10,149,120,0.06)" stroke="rgba(10,149,120,0.22)" stroke-width="1"/>
    <text x="110" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="rgba(10,149,120,0.5)" text-anchor="middle">S</text>
  </g>

  <!-- Waterfall steps -->
  <g transform="translate(755, 110)" opacity="0.55">
    <rect x="0"  y="0"  width="60" height="14" rx="3" fill="rgba(10,149,120,0.12)" stroke="rgba(10,149,120,0.28)" stroke-width="1"/>
    <rect x="20" y="20" width="60" height="14" rx="3" fill="rgba(10,149,120,0.09)" stroke="rgba(10,149,120,0.22)" stroke-width="1"/>
    <rect x="40" y="40" width="60" height="14" rx="3" fill="rgba(10,149,120,0.07)" stroke="rgba(10,149,120,0.18)" stroke-width="1"/>
    <rect x="60" y="60" width="60" height="14" rx="3" fill="rgba(10,149,120,0.05)" stroke="rgba(10,149,120,0.14)" stroke-width="1"/>
    <text x="30" y="11" font-family="'Inter',sans-serif" font-size="7" fill="rgba(0,0,0,0.35)" text-anchor="middle">Plan</text>
    <text x="50" y="31" font-family="'Inter',sans-serif" font-size="7" fill="rgba(0,0,0,0.35)" text-anchor="middle">Design</text>
    <text x="70" y="51" font-family="'Inter',sans-serif" font-size="7" fill="rgba(0,0,0,0.35)" text-anchor="middle">Build</text>
    <text x="90" y="71" font-family="'Inter',sans-serif" font-size="7" fill="rgba(0,0,0,0.35)" text-anchor="middle">Ship</text>
  </g>
</svg>
